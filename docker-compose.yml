services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html
    command: sh -lc "chmod -R 777 storage bootstrap/cache && php-fpm"
    volumes:
      - ./apps/backend:/var/www/html
      - ./assets:/var/www/assets:ro
    depends_on:
      - postgres
      - redis
    networks:
      - app

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8090:80"
    volumes:
      - ./apps/backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./apps/backend:/var/www/html
      - ./assets:/var/www/assets:ro
    depends_on:
      - postgres
      - redis
    networks:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./apps/backend:/var/www/html
      - ./assets:/var/www/assets:ro
    depends_on:
      - postgres
      - redis
    networks:
      - app

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: machine_error_helper
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    networks:
      - app

volumes:
  postgres-data:
  redis-data:

networks:
  app:
    driver: bridge
